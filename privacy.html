<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — HookahMap</title>
  <meta name="description" content="HookahMap Privacy Policy — how we collect, use, and protect your data.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5EFE6;
      color: #2C1A0E;
      min-height: 100vh;
    }
    header {
      background: #EDE8DF;
      border-bottom: 1px solid rgba(139,94,60,0.12);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #8B5E3C;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .logo-link img { width: 32px; height: 32px; border-radius: 8px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .back-link { font-size: 0.85rem; color: #9B7B5B; text-decoration: none; }
    .back-link:hover { color: #8B5E3C; }
    .lang-bar { display: flex; gap: 6px; }
    .lang-btn {
      background: rgba(245,239,230,0.85);
      border: 1px solid rgba(139,94,60,0.2);
      border-radius: 8px;
      color: #9B7B5B;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn:hover, .lang-btn.active {
      background: rgba(139,94,60,0.1);
      border-color: rgba(139,94,60,0.5);
      color: #8B5E3C;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    h1 { font-size: 2.2rem; font-weight: 700; color: #8B5E3C; margin-bottom: 8px; letter-spacing: -0.5px; }
    .updated { font-size: 0.85rem; color: #B8956A; margin-bottom: 48px; }
    h2 { font-size: 1.15rem; font-weight: 700; color: #5C3A1E; margin: 36px 0 12px; }
    p { color: #6B4A2A; line-height: 1.8; font-size: 0.97rem; margin-bottom: 14px; }
    ul { list-style: none; padding: 0; margin-bottom: 14px; }
    ul li { color: #6B4A2A; font-size: 0.97rem; line-height: 1.8; padding-left: 18px; position: relative; }
    ul li::before { content: '·'; position: absolute; left: 0; color: #8B5E3C; font-weight: 700; }
    a { color: #8B5E3C; }
    a:hover { text-decoration: underline; }
    .contact-box {
      margin-top: 48px;
      background: rgba(139,94,60,0.07);
      border: 1px solid rgba(139,94,60,0.15);
      border-radius: 16px;
      padding: 24px 28px;
    }
    .contact-box p { margin: 0; }
    footer {
      background: #E5DDD4;
      border-top: 1px solid rgba(139,94,60,0.1);
      padding: 24px 20px;
      text-align: center;
      color: #B8956A;
      font-size: 0.82rem;
    }
    footer a { color: #9B7B5B; text-decoration: none; }
    footer a:hover { color: #8B5E3C; }
    footer .sep { margin: 0 10px; }
  </style>
</head>

    function setLang(lang) {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
      document.documentElement.lang = lang;
      const t = i18n[lang];
      document.getElementById('pp-title').textContent = t.title;
      document.getElementById('pp-updated').textContent = t.updated;
      document.getElementById('back-link').innerHTML = t.back;
      document.getElementById('pp-intro').textContent = t.intro;
      document.getElementById('h-1').textContent = t.h1;
      document.getElementById('p-1a').textContent = t.p1a;
      document.getElementById('ul-1').innerHTML = t.ul1.map(x => `<li>${x}</li>`).join('');
      document.getElementById('h-2').textContent = t.h2;
      document.getElementById('ul-2').innerHTML = t.ul2.map(x => `<li>${x}</li>`).join('');
      document.getElementById('h-3').textContent = t.h3;
      document.getElementById('p-3').textContent = t.p3;
      document.getElementById('h-4').textContent = t.h4;
      document.getElementById('p-4').textContent = t.p4;
      document.getElementById('ul-4').innerHTML = t.ul4.map(x => `<li>${x}</li>`).join('');
      document.getElementById('h-5').textContent = t.h5;
      document.getElementById('p-5').textContent = t.p5;
      document.getElementById('h-6').textContent = t.h6;
      document.getElementById('p-6').textContent = t.p6;
      document.getElementById('h-7').textContent = t.h7;
      document.getElementById('p-7').textContent = t.p7;
      document.getElementById('h-8').textContent = t.h8;
      document.getElementById('p-8').textContent = t.p8;
      document.getElementById('h-contact').textContent = t.hContact;
      document.getElementById('p-contact').innerHTML = t.pContact;
      document.getElementById('footer-home').textContent = t.footerHome;
      document.getElementById('footer-privacy').textContent = t.footerPrivacy;
      document.getElementById('footer-contact').textContent = t.footerContact;
    }

    // Detect browser language
    const browserLang = navigator.language.slice(0, 2);
    const supported = ['en', 'tr', 'es', 'ru'];
    setLang(supported.includes(browserLang) ? browserLang : 'en');
